<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secret Checkout | LastPlate</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
    body {
        font-family: 'Sora', sans-serif;
        background: #F7F6F2;
        margin: 0;
        padding: 0;
        color: #1A1916;
    }

    .container {
        max-width: 600px;
        margin: 40px auto;
        background: white;
        padding: 28px;
        border-radius: 22px;
        box-shadow: 0 8px 24px rgba(0,0,0,0.08);
        border: 1.5px solid #E4E1D9;
    }

    h1 {
        font-size: 1.7rem;
        font-weight: 700;
        margin-bottom: 10px;
    }

    .dish-box {
        margin-bottom: 22px;
        padding: 18px;
        background: #F1EEE8;
        border-radius: 16px;
    }

    .dish-name {
        font-size: 1.2rem;
        font-weight: 700;
    }

    .restaurant {
        font-size: .8rem;
        color: #777;
        margin-top: 4px;
    }

    label {
        display: block;
        font-size: .85rem;
        margin-bottom: 6px;
        font-weight: 600;
    }

    input, select {
        width: 100%;
        padding: 12px;
        font-size: 1rem;
        border-radius: 12px;
        border: 1.5px solid #DDD8CF;
        margin-bottom: 14px;
        outline: none;
    }

    input:focus {
        border-color: #3D7A2E;
    }

    .btn {
        width: 100%;
        background: #3D7A2E;
        border: none;
        color: white;
        padding: 14px;
        font-size: 1.1rem;
        font-weight: 700;
        border-radius: 14px;
        cursor: pointer;
        transition: 0.25s;
    }
    .btn:hover {
        background: #4E9B3C;
    }

    .price {
        font-size: 1.3rem;
        font-weight: 700;
        text-align: right;
        margin-bottom: 18px;
    }
</style>
</head>
<body>

<div class="container">
    <h1>Secret Menu Checkout</h1>

    <div class="dish-box">
        <div class="dish-name">{{ dish.name }}</div>
        <div class="restaurant">From {{ dish.restaurant_name }}</div>
    </div>

    <label>Quantity</label>
    <select id="qtySelect" onchange="updatePrice()">
        {% for i in range(1, dish.stock + 1) %}
        <option value="{{ i }}">{{ i }}</option>
        {% endfor %}
    </select>

    <label>Your Phone Number</label>
    <input type="text" id="phone" placeholder="Used for pickup verification">

    <div class="price">
        Total: ₹<span id="totalPrice">{{ dish.price }}</span>
    </div>

    <button class="btn" onclick="startPayment()">Pay Securely</button>
</div>


<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<script>
const basePrice = {{ dish.price }};
const dishId = {{ dish.id }};
const rpKey = "{{ razorpay_key if razorpay_key else '' }}"; // optional

function updatePrice() {
    const qty = parseInt(document.getElementById('qtySelect').value);
    
    // 18% markup
    const finalPrice = Math.ceil(basePrice * 1.18) * qty;

    document.getElementById("totalPrice").textContent = finalPrice;
}

async function startPayment() {
    const qty = parseInt(document.getElementById("qtySelect").value);
    const phone = document.getElementById("phone").value;

    if (!phone || phone.length < 8) {
        alert("Enter a valid phone number.");
        return;
    }

    // Create order backend
    const res = await fetch("/api/secret/create-order", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            dish_id: dishId,
            quantity: qty,
            phone: phone
        })
    });

    const data = await res.json();
    if (!data.razorpay_order_id) {
        alert("Error creating payment.");
        return;
    }

    const options = {
        key: data.key,
        amount: data.amount,
        currency: "INR",
        name: "LastPlate Secret Menu",
        description: "{{ dish.name }}",
        order_id: data.razorpay_order_id,

        handler: async function (response) {
            const verify = await fetch("/api/secret/verify-payment", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    razorpay_payment_id: response.razorpay_payment_id,
                    razorpay_order_id: response.razorpay_order_id,
                    razorpay_signature: response.razorpay_signature
                })
            });

            const vr = await verify.json();
            if (vr.success) {
                alert("Payment Successful! Check email for pickup details.");
                window.location.href = "/browse";
            } else {
                alert("Payment failed to verify.");
            }
        }
    };

    const rp = new Razorpay(options);
    rp.open();
}

updatePrice();
</script>

</body>
</html>
