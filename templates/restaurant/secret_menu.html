<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Secret Menu | LastPlate Partner</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #0a0a0b;
      --surface: #131315;
      --surface-2: #1c1c1f;
      --surface-3: #252528;
      --accent: #c8f55a;
      --accent-dim: rgba(200, 245, 90, 0.12);
      --accent-dim2: rgba(200, 245, 90, 0.06);
      --red: #ff5757;
      --red-dim: rgba(255, 87, 87, 0.1);
      --text-primary: #f0f0f2;
      --text-secondary: #6b6b72;
      --text-tertiary: #3d3d42;
      --border: rgba(255, 255, 255, 0.06);
      --border-2: rgba(255, 255, 255, 0.1);
      --spring: cubic-bezier(0.34, 1.56, 0.64, 1);
      --ease-out: cubic-bezier(0.25, 0, 0, 1);
    }

    * { box-sizing: border-box; -webkit-font-smoothing: antialiased; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text-primary);
      font-family: 'Geist', -apple-system, sans-serif;
      min-height: 100vh;
    }

    /* Subtle noise texture overlay */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none; opacity: 0.4;
    }

    /* ── HEADER ── */
    header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(10, 10, 11, 0.85);
      backdrop-filter: blur(24px) saturate(180%);
      -webkit-backdrop-filter: blur(24px) saturate(180%);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
      display: flex; align-items: center; justify-content: space-between;
    }

    .header-left { display: flex; align-items: center; gap: 10px; }

    .header-eyebrow {
      font-family: 'Geist', sans-serif;
      font-size: 10px; font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-secondary);
    }

    .header-title {
      font-family: 'Geist', sans-serif;
      font-size: 17px; font-weight: 600;
      letter-spacing: -0.3px;
      color: var(--text-primary);
    }

    .btn-add {
      display: flex; align-items: center; gap: 6px;
      background: var(--accent);
      color: #0a0a0b;
      text-decoration: none;
      padding: 9px 16px;
      border-radius: 100px;
      font-family: 'Geist', sans-serif;
      font-weight: 600; font-size: 13px;
      letter-spacing: 0.02em;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }
    .btn-add:active { transform: scale(0.93); opacity: 0.85; }

    /* ── MAIN LAYOUT ── */
    .container {
      max-width: 720px;
      margin: 0 auto;
      padding: 28px 16px 80px;
      position: relative; z-index: 1;
    }

    .page-header {
      margin-bottom: 28px;
    }

    .page-title {
      font-family: 'Instrument Serif', Georgia, serif;
      font-size: 48px;
      font-weight: 400;
      letter-spacing: -0.5px;
      line-height: 1.05;
      margin-bottom: 8px;
      text-align: left;
    }

    .page-title em {
      font-style: italic;
      color: var(--accent);
    }

    .page-subtitle {
      font-size: 13px;
      font-weight: 400;
      color: var(--text-secondary);
      letter-spacing: 0.01em;
      text-align: left;
    }

    /* ── CONTROL BAR ── */
    .control-bar {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .ctrl-btn {
      display: flex; align-items: center; gap: 7px;
      padding: 10px 16px;
      border-radius: 12px;
      border: 1px solid var(--border-2);
      background: var(--surface-2);
      color: var(--text-primary);
      font-family: 'Geist', sans-serif;
      font-size: 13px; font-weight: 500;
      cursor: pointer;
      transition: all 0.18s ease;
      user-select: none;
    }
    .ctrl-btn:hover { background: var(--surface-3); border-color: rgba(255,255,255,0.15); }
    .ctrl-btn:active { transform: scale(0.95); }

    .ctrl-btn.all-on {
      background: var(--accent-dim);
      border-color: rgba(200, 245, 90, 0.2);
      color: var(--accent);
    }
    .ctrl-btn.all-on:hover { background: rgba(200, 245, 90, 0.18); }

    .ctrl-btn.all-off {
      background: var(--red-dim);
      border-color: rgba(255, 87, 87, 0.2);
      color: var(--red);
    }
    .ctrl-btn.all-off:hover { background: rgba(255, 87, 87, 0.16); }

    .ctrl-btn svg { flex-shrink: 0; }

    /* Status pill */
    .status-pill {
      margin-left: auto;
      display: flex; align-items: center; gap: 6px;
      padding: 8px 12px;
      border-radius: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      font-size: 12px; font-weight: 500; color: var(--text-secondary);
    }
    .status-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 6px var(--accent);
    }
    #active-count { color: var(--text-primary); font-weight: 600; }

    /* ── DIVIDER ── */
    .section-label {
      font-family: 'Geist', sans-serif;
      font-size: 10px; font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-tertiary);
      margin-bottom: 10px;
      padding-left: 2px;
      text-align: left;
    }

    /* ── DISH CARD ── */
    #list { display: flex; flex-direction: column; gap: 10px; }

    .item {
      display: flex; align-items: center; gap: 14px;
      padding: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      transition: border-color 0.25s ease, background 0.25s ease, transform 0.15s ease;
      position: relative;
      overflow: hidden;
    }
    .item.is-active {
      border-color: rgba(200, 245, 90, 0.2);
      background: linear-gradient(135deg, rgba(200,245,90,0.04) 0%, var(--surface) 60%);
    }
    .item:active { transform: scale(0.99); }

    /* Subtle glow line on left when active */
    .item.is-active::before {
      content: '';
      position: absolute; left: 0; top: 20%; bottom: 20%;
      width: 3px;
      background: var(--accent);
      border-radius: 0 2px 2px 0;
      box-shadow: 0 0 10px var(--accent);
    }

    /* Image */
    .img-wrapper {
      width: 60px; height: 60px; flex-shrink: 0;
      border-radius: 13px; overflow: hidden;
      background: var(--surface-3);
      position: relative;
    }
    .img-wrapper::after {
      content: ''; position: absolute; inset: 0;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 13px; pointer-events: none;
    }
    .item img { width: 100%; height: 100%; object-fit: cover; display: block; }

    /* Info */
    .item-info { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 5px; }

    .item-name {
      font-family: 'Geist', sans-serif;
      font-size: 15px; font-weight: 600;
      letter-spacing: -0.2px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      text-align: left;
    }

    .item-meta {
      display: flex; align-items: center; gap: 8px;
      flex-wrap: wrap;
    }

    .price {
      font-size: 14px; font-weight: 600;
      color: var(--text-primary);
    }

    .sep { color: var(--text-tertiary); font-size: 12px; }

    /* Stock pill with inline edit */
    .stock-pill {
      display: inline-flex; align-items: center; gap: 5px;
      background: var(--surface-2);
      border: 1px solid var(--border-2);
      border-radius: 8px;
      padding: 3px 8px;
      font-size: 12px; font-weight: 500;
      color: var(--text-secondary);
      cursor: default;
      transition: border-color 0.15s ease;
    }
    .stock-pill.low { border-color: rgba(255, 87, 87, 0.3); color: var(--red); }
    .stock-pill.editing { border-color: var(--accent); }

    .stock-label { font-size: 10px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; opacity: 0.6; }

    .stock-controls {
      display: flex; align-items: center; gap: 4px;
      margin-left: 2px;
    }

    .qty-btn {
      width: 20px; height: 20px;
      border-radius: 6px;
      border: 1px solid var(--border-2);
      background: var(--surface-3);
      color: var(--text-primary);
      font-size: 14px; line-height: 1;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: all 0.15s ease;
      font-weight: 700;
      user-select: none;
      flex-shrink: 0;
    }
    .qty-btn:hover { background: var(--surface-2); border-color: var(--border-2); }
    .qty-btn:active { transform: scale(0.88); }
    .qty-btn.plus:hover { border-color: rgba(200,245,90,0.4); color: var(--accent); }
    .qty-btn.minus:hover { border-color: rgba(255,87,87,0.4); color: var(--red); }

    .stock-val {
      font-size: 14px; font-weight: 600;
      min-width: 22px; text-align: center;
      color: var(--text-primary);
      font-family: 'Geist', sans-serif;
    }

    /* ── TOGGLE ── */
    .toggle-wrapper { padding-right: 4px; flex-shrink: 0; }

    .toggle {
      width: 48px; height: 28px;
      background: var(--surface-3);
      border: 1px solid var(--border-2);
      border-radius: 28px;
      position: relative; cursor: pointer;
      transition: background-color 0.3s ease, border-color 0.3s ease;
    }

    .toggle.active {
      background: var(--accent);
      border-color: transparent;
    }

    .knob {
      width: 22px; height: 22px;
      background: #fff;
      border-radius: 50%;
      position: absolute;
      top: 2px; left: 2px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.25);
      transition: transform 0.35s var(--spring);
    }
    .toggle.active .knob { transform: translateX(20px); }
    .toggle.active .knob { background: #0a0a0b; }

    .empty-state {
      padding: 48px 4px;
      color: var(--text-secondary);
      text-align: left;
    }
    .empty-state h3 {
      font-family: 'Instrument Serif', Georgia, serif;
      font-size: 28px; font-weight: 400;
      color: var(--text-primary);
      margin-bottom: 8px;
    }
    .empty-state p { font-size: 14px; line-height: 1.6; }

    /* ── TOAST ── */
    .toast-container {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%);
      z-index: 999;
      display: flex; flex-direction: column; align-items: center; gap: 8px;
      pointer-events: none;
    }

    .toast {
      display: flex; align-items: center; gap: 8px;
      padding: 11px 18px;
      background: var(--surface-2);
      border: 1px solid var(--border-2);
      border-radius: 100px;
      font-size: 13px; font-weight: 500; color: var(--text-primary);
      backdrop-filter: blur(20px);
      box-shadow: 0 8px 30px rgba(0,0,0,0.5);
      animation: toastIn 0.3s var(--spring) forwards, toastOut 0.3s ease 2s forwards;
      white-space: nowrap;
    }
    .toast.success { border-color: rgba(200,245,90,0.3); }
    .toast.error { border-color: rgba(255,87,87,0.3); }

    @keyframes toastIn {
      from { opacity: 0; transform: translateY(12px) scale(0.95); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes toastOut {
      to { opacity: 0; transform: translateY(-6px) scale(0.96); }
    }

    /* ── SKELETON LOADER ── */
    .skeleton {
      background: linear-gradient(90deg, var(--surface) 0%, var(--surface-2) 50%, var(--surface) 100%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 18px;
      height: 84px;
    }
    @keyframes shimmer { to { background-position: -200% 0; } }

    /* Animation for items entering */
    .item { animation: itemIn 0.35s var(--ease-out) backwards; }
    @keyframes itemIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body>
  <header>
    <div class="header-left">
      <div>
        <div class="header-eyebrow">LastPlate Partner</div>
        <div class="header-title">✦ Secret Menu</div>
      </div>
    </div>
    <a href="/restaurant/secret-menu/add" class="btn-add">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Add Dish
    </a>
  </header>

  <div class="container">
    <div class="page-header">
      <h1 class="page-title">Today's<br><em>Specials</em></h1>
      <p class="page-subtitle">Exclusive dishes visible to app users only</p>
    </div>

    <div class="control-bar">
      <button class="ctrl-btn all-on" onclick="setAll(true)">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/></svg>
        All On
      </button>
      <button class="ctrl-btn all-off" onclick="setAll(false)">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/></svg>
        All Off
      </button>
      <div class="status-pill">
        <div class="status-dot" id="status-dot"></div>
        <span id="active-count">0</span>&nbsp;active
      </div>
    </div>

    <div class="section-label">Dishes</div>
    <div id="list">
      <div class="skeleton"></div>
      <div class="skeleton" style="animation-delay:0.08s;opacity:0.7"></div>
      <div class="skeleton" style="animation-delay:0.16s;opacity:0.4"></div>
    </div>
  </div>

  <div class="toast-container" id="toasts"></div>

<script>
  // ── Utilities ──────────────────────────────────────────────
  function showToast(msg, type = 'success') {
    const tc = document.getElementById('toasts');
    const el = document.createElement('div');
    el.className = `toast ${type}`;
    el.innerHTML = `${type === 'success' ? '✦' : '⚠'} ${msg}`;
    tc.appendChild(el);
    setTimeout(() => el.remove(), 2400);
  }

  function haptic(pattern) {
    if (navigator.vibrate) navigator.vibrate(pattern);
  }

  function updateActiveCount() {
    const active = document.querySelectorAll('#list .toggle.active').length;
    document.getElementById('active-count').textContent = active;
    const dot = document.getElementById('status-dot');
    dot.style.background = active > 0 ? 'var(--accent)' : 'var(--text-tertiary)';
    dot.style.boxShadow = active > 0 ? '0 0 6px var(--accent)' : 'none';
  }

  // ── Render ─────────────────────────────────────────────────
  async function loadSecret() {
    const list = document.getElementById('list');

    try {
      const res = await fetch('/restaurant/api/my-secret-menu');
      const items = await res.json();

      list.innerHTML = '';

      if (!items || items.length === 0) {
        list.innerHTML = `
          <div class="empty-state">
            <h3>No secret dishes yet</h3>
            <p>Tap 'Add Dish' to create exclusive<br>offers visible only to app users.</p>
          </div>`;
        return;
      }

      items.forEach((item, i) => {
        const isLow = item.stock <= 5;
        const card = document.createElement('div');
        card.className = `item ${item.is_today_special ? 'is-active' : ''}`;
        card.style.animationDelay = `${i * 0.05}s`;
        card.dataset.id = item.id;
        card.innerHTML = `
          <div class="img-wrapper">
            <img src="${item.img}" alt="${item.name}" loading="lazy">
          </div>
          <div class="item-info">
            <div class="item-name">${item.name}</div>
            <div class="item-meta">
              <span class="price">₹${item.price}</span>
              <span class="sep">·</span>
              <div class="stock-pill ${isLow ? 'low' : ''}" id="stock-pill-${item.id}">
                <span class="stock-label">Qty</span>
                <div class="stock-controls">
                  <div class="qty-btn minus" onclick="changeQty(${item.id}, -1, event)">−</div>
                  <span class="stock-val" id="stock-val-${item.id}">${item.stock}</span>
                  <div class="qty-btn plus" onclick="changeQty(${item.id}, 1, event)">+</div>
                </div>
              </div>
            </div>
          </div>
          <div class="toggle-wrapper">
            <div class="toggle ${item.is_today_special ? 'active' : ''}" data-id="${item.id}" onclick="toggleSpecial(${item.id}, this)">
              <div class="knob"></div>
            </div>
          </div>
        `;
        list.appendChild(card);
      });

      updateActiveCount();
    } catch (err) {
      list.innerHTML = `<div class="empty-state"><h3>Couldn't load dishes</h3><p>Check your connection and try again.</p></div>`;
    }
  }

  // ── Toggle ─────────────────────────────────────────────────
  async function toggleSpecial(id, toggleEl) {
    const wasActive = toggleEl.classList.contains('active');
    const card = toggleEl.closest('.item');

    // Optimistic
    toggleEl.classList.toggle('active');
    card.classList.toggle('is-active');
    haptic(40);
    updateActiveCount();

    try {
      await fetch(`/restaurant/api/toggle-secret/${id}`, { method: 'POST' });
    } catch {
      // Revert
      toggleEl.classList.toggle('active');
      card.classList.toggle('is-active');
      updateActiveCount();
      showToast('Could not update status', 'error');
    }
  }

  // ── All On / All Off ───────────────────────────────────────
  async function setAll(enable) {
    const allToggles = document.querySelectorAll('#list .toggle[data-id]');
    if (!allToggles.length) return;

    const targets = Array.from(allToggles).filter(t =>
      enable ? !t.classList.contains('active') : t.classList.contains('active')
    );

    if (!targets.length) {
      showToast(enable ? 'All dishes already on' : 'All dishes already off');
      return;
    }

    haptic(enable ? [30, 40, 30] : [50, 50, 50]);

    targets.forEach(t => {
      t.classList.toggle('active', enable);
      t.closest('.item').classList.toggle('is-active', enable);
    });
    updateActiveCount();

    try {
      await Promise.all(targets.map(t =>
        fetch(`/restaurant/api/toggle-secret/${t.dataset.id}`, { method: 'POST' })
      ));
      showToast(enable ? `${targets.length} dishes turned on` : `${targets.length} dishes turned off`);
    } catch {
      // Revert all
      targets.forEach(t => {
        t.classList.toggle('active', !enable);
        t.closest('.item').classList.toggle('is-active', !enable);
      });
      updateActiveCount();
      showToast('Network issue — changes reverted', 'error');
      loadSecret();
    }
  }

  // ── Qty Update ─────────────────────────────────────────────
  const qtyDebounceMap = {};

  function changeQty(id, delta, event) {
    event.stopPropagation(); // don't bubble to card

    const valEl = document.getElementById(`stock-val-${id}`);
    const pillEl = document.getElementById(`stock-pill-${id}`);
    if (!valEl) return;

    let current = parseInt(valEl.textContent, 10);
    const newVal = Math.max(0, current + delta);
    if (newVal === current) return;

    valEl.textContent = newVal;
    pillEl.classList.toggle('low', newVal <= 5);
    haptic(20);

    // Debounce: only fire API 600ms after last tap
    clearTimeout(qtyDebounceMap[id]);
    qtyDebounceMap[id] = setTimeout(async () => {
      try {
        await fetch(`/restaurant/api/update-stock/${id}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ stock: parseInt(valEl.textContent, 10) })
        });
        showToast(`Stock updated to ${valEl.textContent}`);
      } catch {
        showToast('Could not save stock', 'error');
      }
    }, 600);
  }

  // ── Init ───────────────────────────────────────────────────
  loadSecret();
</script>
</body>
</html>
